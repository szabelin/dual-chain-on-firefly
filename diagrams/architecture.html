<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>dual-chain-on-firefly — architecture</title>
<style>
  :root {
    --bg: #0a0a0c;
    --bg-soft: #131318;
    --border: #2a2a32;
    --border-soft: #1c1c22;
    --text: #f5f5f7;
    --text-soft: #c0c0c8;
    --text-muted: #6e6e76;

    --neutral-bg: #1a1a1f;
    --neutral-border: #2e2e36;

    --priv-accent: #a78bfa;
    --priv-bg: #181229;
    --priv-border: #3d2e6e;
    --priv-deep-bg: #110a26;
    --priv-deep-border: #5a4296;

    --pub-accent: #6ee7b7;
    --pub-bg: #0d2018;
    --pub-border: #1f5840;
    --pub-deep-bg: #07170f;
    --pub-deep-border: #2e8763;

    --contract-accent: #fcd34d;
    --contract-bg: #1c1606;
    --contract-border: #5e4914;

    --line: #4a4a55;
  }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { padding: 56px 64px; max-width: 1280px; margin: 0 auto; }
  .eyebrow { color: var(--text-muted); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 8px; }
  h1 { font-weight: 600; font-size: 28px; margin: 0 0 6px; letter-spacing: -.015em; color: var(--text); }
  .sub { color: var(--text-muted); font-size: 15px; margin-bottom: 36px; max-width: 680px; line-height: 1.5; }
  svg { display: block; margin: 0 auto; }
  text { font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
</style>
</head>
<body>
<div class="wrap">
<div class="eyebrow">dual-chain-on-firefly</div>
<h1>Two rails. One wallet. One UI.</h1>
<div class="sub">Public rail signs in the browser and broadcasts real ETH on Ethereum mainnet. Private rail goes through a Java service to local FireFly, which talks to a permissioned Besu chain running a Solidity ERC-20.</div>

<svg viewBox="0 0 1180 1080" width="1180" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a4a55" />
    </marker>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>

  <!-- TIER 0: WEB APP (centered) -->
  <g>
    <rect x="390" y="20" width="400" height="100" rx="14" fill="#1a1a1f" stroke="#2e2e36" stroke-width="1.5"/>
    <rect x="390" y="20" width="400" height="3" rx="1.5" fill="url(#brand)" opacity="0.85"/>
    <text x="590" y="56" text-anchor="middle" fill="#6e6e76" font-size="11" letter-spacing="2">USER INTERFACE</text>
    <text x="590" y="84" text-anchor="middle" fill="#f5f5f7" font-size="20" font-weight="600">Web app</text>
    <text x="590" y="106" text-anchor="middle" fill="#c0c0c8" font-size="13">Next.js · Privy embedded wallet · email login</text>
  </g>

  <!-- branching arrows from web app -->
  <line x1="490" y1="120" x2="320" y2="200" stroke="#4a4a55" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="690" y1="120" x2="860" y2="200" stroke="#4a4a55" stroke-width="1.5" marker-end="url(#ar)"/>

  <text x="345" y="175" fill="#a78bfa" font-size="12" font-style="italic" text-anchor="middle">private rail</text>
  <text x="835" y="175" fill="#6ee7b7" font-size="12" font-style="italic" text-anchor="middle">public rail</text>

  <!-- TIER 1: APPLICATION SERVICES -->
  <!-- LEFT: Java Spring Boot -->
  <g>
    <rect x="120" y="200" width="400" height="92" rx="12" fill="#181229" stroke="#3d2e6e" stroke-width="1.5"/>
    <text x="140" y="231" fill="#a78bfa" font-size="11" letter-spacing="2">SERVICE · JAVA</text>
    <text x="140" y="258" fill="#f5f5f7" font-size="18" font-weight="600">Java Spring Boot service</text>
    <text x="140" y="280" fill="#c0c0c8" font-size="13">REST API · plain HTTP · no web3 libraries</text>
  </g>
  <!-- RIGHT: Privy SDK -->
  <g>
    <rect x="660" y="200" width="400" height="92" rx="12" fill="#0d2018" stroke="#1f5840" stroke-width="1.5"/>
    <text x="680" y="231" fill="#6ee7b7" font-size="11" letter-spacing="2">SDK · BROWSER</text>
    <text x="680" y="258" fill="#f5f5f7" font-size="18" font-weight="600">Privy SDK</text>
    <text x="680" y="280" fill="#c0c0c8" font-size="13">Signs transactions in the browser · MPC-secured</text>
  </g>

  <!-- arrows down -->
  <line x1="320" y1="292" x2="320" y2="338" stroke="#4a4a55" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="860" y1="292" x2="860" y2="338" stroke="#4a4a55" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- TIER 2: GATEWAYS -->
  <!-- LEFT: FireFly -->
  <g>
    <rect x="120" y="338" width="400" height="92" rx="12" fill="#181229" stroke="#3d2e6e" stroke-width="1.5"/>
    <text x="140" y="369" fill="#a78bfa" font-size="11" letter-spacing="2">GATEWAY · LOCAL</text>
    <text x="140" y="396" fill="#f5f5f7" font-size="18" font-weight="600">Hyperledger FireFly</text>
    <text x="140" y="418" fill="#c0c0c8" font-size="13">REST gateway · OpenAPI · evmconnect</text>
    <text x="500" y="396" fill="#6e6e76" font-size="11" text-anchor="end" class="mono">localhost:5100</text>
  </g>
  <!-- RIGHT: Alchemy -->
  <g>
    <rect x="660" y="338" width="400" height="92" rx="12" fill="#0d2018" stroke="#1f5840" stroke-width="1.5"/>
    <text x="680" y="369" fill="#6ee7b7" font-size="11" letter-spacing="2">GATEWAY · HOSTED</text>
    <text x="680" y="396" fill="#f5f5f7" font-size="18" font-weight="600">Alchemy RPC</text>
    <text x="680" y="418" fill="#c0c0c8" font-size="13">Hosted Ethereum node · JSON-RPC</text>
  </g>

  <!-- arrows down -->
  <line x1="320" y1="430" x2="320" y2="476" stroke="#4a4a55" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="860" y1="430" x2="860" y2="476" stroke="#4a4a55" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- TIER 3: BLOCKCHAINS (bigger, more prominent) -->
  <!-- LEFT: Besu private chain (with contract embedded) -->
  <g>
    <rect x="100" y="476" width="440" height="240" rx="14" fill="#110a26" stroke="#5a4296" stroke-width="2"/>
    <text x="120" y="510" fill="#a78bfa" font-size="11" letter-spacing="2">BLOCKCHAIN · PERMISSIONED</text>
    <text x="120" y="540" fill="#f5f5f7" font-size="22" font-weight="600">Besu private chain</text>
    <text x="120" y="565" fill="#c0c0c8" font-size="13">Ethereum-compatible · permissioned validators</text>

    <!-- nested contract card -->
    <g>
      <rect x="120" y="590" width="400" height="106" rx="10" fill="#1c1606" stroke="#5e4914" stroke-width="1.5"/>
      <text x="140" y="618" fill="#fcd34d" font-size="10" letter-spacing="2">DEPLOYED CONTRACT</text>
      <text x="140" y="644" fill="#f5f5f7" font-size="16" font-weight="600">DualToken.sol</text>
      <text x="140" y="664" fill="#c0c0c8" font-size="12">Solidity ERC-20 · OpenZeppelin · 18 decimals</text>
      <text x="140" y="684" fill="#fcd34d" font-size="12" class="mono" font-weight="500">DUAL · 1,000,000 supply</text>
    </g>
  </g>
  <!-- RIGHT: Ethereum Mainnet -->
  <g>
    <rect x="640" y="476" width="440" height="240" rx="14" fill="#07170f" stroke="#2e8763" stroke-width="2"/>
    <text x="660" y="510" fill="#6ee7b7" font-size="11" letter-spacing="2">BLOCKCHAIN · PUBLIC</text>
    <text x="660" y="540" fill="#f5f5f7" font-size="22" font-weight="600">Ethereum Mainnet</text>
    <text x="660" y="565" fill="#c0c0c8" font-size="13">Public · permissionless · real settlement</text>

    <!-- info card -->
    <g>
      <rect x="660" y="590" width="400" height="106" rx="10" fill="#0a1f15" stroke="#1f5840" stroke-width="1.5"/>
      <text x="680" y="618" fill="#6ee7b7" font-size="10" letter-spacing="2">PUBLIC TRANSFER</text>
      <text x="680" y="644" fill="#f5f5f7" font-size="16" font-weight="600">ETH transfer</text>
      <text x="680" y="664" fill="#c0c0c8" font-size="12">Public · permissionless · irreversible</text>
      <text x="680" y="684" fill="#6ee7b7" font-size="12" class="mono" font-weight="500">live mainnet settlement</text>
    </g>
  </g>

  <!-- BOTTOM: live event feed back to UI -->
  <line x1="290" y1="716" x2="430" y2="820" stroke="#4a4a55" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="890" y1="716" x2="750" y2="820" stroke="#4a4a55" stroke-width="1.2" stroke-dasharray="4 4"/>

  <g>
    <rect x="280" y="820" width="620" height="100" rx="14" fill="#131318" stroke="#2a2a32" stroke-width="1.5"/>
    <text x="590" y="852" text-anchor="middle" fill="#6e6e76" font-size="11" letter-spacing="2">FEEDBACK · BOTH RAILS</text>
    <text x="590" y="880" text-anchor="middle" fill="#f5f5f7" font-size="17" font-weight="600">Live transaction feed</text>
    <text x="590" y="902" text-anchor="middle" fill="#c0c0c8" font-size="13">WebSocket events stream from both chains back into the UI</text>
  </g>

  <!-- footer line -->
  <text x="590" y="1010" text-anchor="middle" fill="#6e6e76" font-size="11" letter-spacing="2" class="mono">DUAL-CHAIN-ON-FIREFLY · TWO RAILS · ONE FLOW</text>
</svg>
</div>
</body>
</html>
