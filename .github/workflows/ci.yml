name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mint-service:
    name: mint-service (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mint-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build + unit + integration tests
        run: ./mvnw -B verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-failsafe-reports
          path: |
            mint-service/target/surefire-reports/
            mint-service/target/failsafe-reports/
